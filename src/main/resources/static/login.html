<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能工单系统 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .auth-card {
        max-width: 460px;
        width: 100%;
        background: white;
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        overflow: hidden;
    }
    .tabs {
        display: flex;
        border-bottom: 1px solid #eef2f6;
        background: #fafbfc;
    }
    .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 18px 0;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        color: #5b6e8c;
        transition: 0.2s;
    }
    .tab-btn.active {
        color: #4f46e5;
        border-bottom: 3px solid #4f46e5;
        background: white;
    }
    .form-panel {
        padding: 32px 28px 40px;
        display: none;
        animation: fadeIn 0.3s;
    }
    .form-panel.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    h2 { font-size: 1.75rem; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .sub { color: #64748b; margin-bottom: 28px; font-size: 0.9rem; }
    .input-group { margin-bottom: 22px; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: #334155; margin-bottom: 6px; }
    input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid #e2e8f0;
        border-radius: 16px;
        font-size: 0.95rem;
        transition: 0.2s;
    }
    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.2); }
    .btn-primary {
        width: 100%;
        background: #4f46e5;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 40px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
    .message { margin-top: 20px; padding: 12px; border-radius: 16px; font-size: 0.85rem; text-align: center; display: none; }
    .error { background: #fee2e2; color: #b91c1c; border-left: 4px solid #ef4444; }
    .success { background: #e0f2fe; color: #0c4a6e; border-left: 4px solid #0284c7; }
    .footer-note { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 24px; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="tabs">
    <button class="tab-btn active" data-tab="login">登录</button>
    <button class="tab-btn" data-tab="register">注册</button>
  </div>
  <div class="form-panel active" id="loginPanel">
    <h2>欢迎回来</h2>
    <div class="sub">登录以管理智能工单</div>
    <form id="loginForm">
      <div class="input-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="用户名"></div>
      <div class="input-group"><label>密码</label><input type="password" id="loginPassword" placeholder="密码"></div>
      <button type="submit" class="btn-primary">登 录</button>
    </form>
    <div id="loginMessage" class="message"></div>
    <div class="footer-note">演示：注册新用户 或 使用 test/123456</div>
  </div>
  <div class="form-panel" id="registerPanel">
    <h2>创建账号</h2>
    <div class="sub">开始智能工单体验</div>
    <form id="registerForm">
      <div class="input-group"><label>用户名 (3-20位 字母数字下划线)</label><input type="text" id="regUsername"></div>
      <div class="input-group"><label>密码 (6-20位)</label><input type="password" id="regPassword"></div>
      <button type="submit" class="btn-primary">注 册</button>
    </form>
    <div id="registerMessage" class="message"></div>
  </div>
</div>
<script>
  // 后端API地址（根据实际情况修改）
  const API_BASE = window.location.origin || 'http://localhost:8080';

  // 通用请求函数
  async function apiRequest(endpoint, method = 'GET', body = null, customHeaders = {}) {
      const url = `${API_BASE}${endpoint}`;
      const headers = {
          'Content-Type': 'application/json',
          ...customHeaders
      };
      const config = { method, headers };
      if (body && (method === 'POST' || method === 'PUT')) {
          config.body = JSON.stringify(body);
      }
      const response = await fetch(url, config);
      let data;
      try {
          data = await response.json();
      } catch (e) {
          throw new Error(`请求失败: ${response.status}`);
      }
      if (data.code !== 200) {
          throw new Error(data.message || `请求异常 (${data.code})`);
      }
      return data;
  }

  // DOM 元素
  const loginPanel = document.getElementById('loginPanel');
  const registerPanel = document.getElementById('registerPanel');
  const tabBtns = document.querySelectorAll('.tab-btn');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const loginMsg = document.getElementById('loginMessage');
  const regMsg = document.getElementById('registerMessage');

  tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
          const target = btn.getAttribute('data-tab');
          tabBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if(target === 'login') {
              loginPanel.classList.add('active');
              registerPanel.classList.remove('active');
          } else {
              registerPanel.classList.add('active');
              loginPanel.classList.remove('active');
          }
          loginMsg.style.display = 'none';
          regMsg.style.display = 'none';
      });
  });

  loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if(!username || !password) {
          showMsg(loginMsg, '请填写用户名和密码', 'error');
          return;
      }
      try {
          const data = await apiRequest('/api/auth/login', 'POST', { username, password });
          const token = data.data;
          if(!token) throw new Error('登录失败');
          // 生成模拟 userId（后端需要Long，实际应从用户信息接口获取，这里用哈希）
          const mockUserId = Math.abs(username.split('').reduce((a,b)=>a+b.charCodeAt(0),0) % 9000) + 1000;
          localStorage.setItem('token', token);
          localStorage.setItem('username', username);
          localStorage.setItem('userId', mockUserId);
          showMsg(loginMsg, '登录成功，跳转主页...', 'success');
          setTimeout(() => { window.location.href = 'home.html'; }, 800);
      } catch(err) {
          showMsg(loginMsg, err.message || '登录失败', 'error');
      }
  });

  registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      if(!username || !password) { showMsg(regMsg, '请填写完整', 'error'); return; }
      if(username.length<3 || username.length>20 || !/^[a-zA-Z0-9_]+$/.test(username)) {
          showMsg(regMsg, '用户名格式错误', 'error'); return;
      }
      if(password.length<6 || password.length>20) { showMsg(regMsg, '密码长度6-20位', 'error'); return; }
      try {
          await apiRequest('/api/auth/register', 'POST', { username, password });
          showMsg(regMsg, '注册成功，请登录', 'success');
          setTimeout(() => {
              document.querySelector('.tab-btn[data-tab="login"]').click();
              document.getElementById('loginUsername').value = username;
          }, 1000);
      } catch(err) {
          showMsg(regMsg, err.message || '注册失败', 'error');
      }
  });

  function showMsg(el, text, type) {
      el.textContent = text;
      el.className = `message ${type}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
  }
</script>
</body>
</html>
